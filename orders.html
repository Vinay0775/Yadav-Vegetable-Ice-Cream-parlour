<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Orders - Yadav Store</title>
    <link rel="icon" type="image/png" href="assets/fav-icon.png">
    <link rel="apple-touch-icon" href="assets/fav-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Desktop Header & Navigation Wrapper -->
    <div class="sticky-top w-100 shadow-sm" style="z-index: 1050;">
        <!-- Main Header (Logo, Search, Icons) -->
        <header class="main-header py-2 py-lg-3 bg-white border-bottom">
            <div class="container d-flex flex-wrap justify-content-between align-items-center gap-3">

                <!-- Mobile/Desktop: Left (Logo) -->
                <a class="navbar-brand fw-bold fs-3 logo-text m-0 p-0" style="white-space:nowrap;" href="index.html">
                    Yadav <span class="text-success">Vegetable</span> <span class="text-pink fs-6 d-none d-sm-inline">&
                        Ice-Cream</span>
                </a>

                <!-- Desktop Search Bar (Center) -->
                <div class="input-group search-bar d-none d-lg-flex mx-auto"
                    style="max-width: 500px; flex: 1 1 auto; min-width: 250px;">
                    <select id="globalSearchCategory" class="form-select border-success shadow-none bg-light text-muted"
                        style="max-width: 140px;">
                        <option value="All">All Categories</option>
                        <option value="Vegetables">Veggies</option>
                        <option value="Fruits">Fruits</option>
                        <option value="Ice-Creams">Ice-Creams</option>
                    </select>
                    <input type="text" id="globalSearchInput" class="form-control border-success shadow-none"
                        placeholder="Search products...">
                    <button id="globalSearchBtn" class="btn btn-success px-4 bg-success border-success" type="button"><i
                            class="bi bi-search"></i></button>
                </div>

                <!-- Desktop Icons (Right) -->
                <div class="header-icons d-none d-lg-flex align-items-center gap-3 ms-auto">
                    <a href="#" class="text-dark text-decoration-none fs-5 icon-link theme-toggle-btn me-2"
                        title="Toggle Dark/Light Mode"><i class="bi bi-moon"></i></a>
                    <a href="login.html" class="text-dark text-decoration-none fs-5 icon-link position-relative"
                        title="Login/Profile"><i class="bi bi-person"></i></a>
                    <a href="orders.html" class="text-dark text-decoration-none fs-5 icon-link position-relative"
                        title="My Orders"><i class="bi bi-box-seam"></i></a>
                    <a href="#" class="text-dark text-decoration-none fs-5 icon-link position-relative"
                        title="Favorites">
                        <i class="bi bi-heart"></i>
                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success badge-count">0</span>
                    </a>
                    <a href="cart.html"
                        class="text-dark text-decoration-none fs-5 icon-link position-relative d-flex align-items-center"
                        title="Cart">
                        <i class="bi bi-cart3"></i>
                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-pink badge-count cart-total-badge"
                            id="cartCount">0</span>
                    </a>
                </div>

                <!-- Mobile: Right (Cart & Hamburger) -->
                <div class="d-flex d-lg-none align-items-center gap-3 ms-auto">
                    <a href="#" class="text-dark text-decoration-none fs-5 icon-link theme-toggle-btn"
                        title="Toggle Dark/Light Mode"><i class="bi bi-moon"></i></a>
                    <a href="cart.html" class="text-dark text-decoration-none fs-5 position-relative icon-link"
                        title="Cart">
                        <i class="bi bi-cart3"></i>
                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-pink badge-count cart-total-badge">0</span>
                    </a>
                    <button class="navbar-toggler border-0 shadow-none p-0 ms-1" type="button"
                        data-bs-toggle="offcanvas" data-bs-target="#mainNav">
                        <i class="bi bi-list fs-1 text-dark"></i>
                    </button>
                </div>

                <!-- Mobile Search Bar (Full width below) -->
                <div class="w-100 d-lg-none mt-2">
                    <div class="input-group search-bar mx-auto w-100">
                        <input type="text" id="globalSearchInputMobile"
                            class="form-control border-success shadow-none bg-light text-dark"
                            placeholder="Search products...">
                        <button id="globalSearchBtnMobile" class="btn btn-success px-3 bg-success border-success"
                            type="button"><i class="bi bi-search"></i></button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Navigation Menu (Desktop separate row & Mobile Offcanvas) -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white py-0 p-lg-0" id="mainNavbar">
            <div class="container">
                <div class="offcanvas-lg offcanvas-end bg-white" tabindex="-1" id="mainNav"
                    style="--bs-offcanvas-width: 280px;">
                    <div class="offcanvas-header border-bottom d-lg-none py-3">
                        <h5 class="offcanvas-title fw-bold logo-text text-dark fs-4" style="font-size:1.5rem;">Yadav
                            <span class="text-success">Menu</span></h5>
                        <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas" data-bs-target="#mainNav"></button>
                    </div>
                    <div class="offcanvas-body d-flex align-items-lg-center">
                        <!-- Navigation Links -->
                        <ul
                            class="navbar-nav flex-lg-row ms-lg-auto justify-content-lg-start align-items-lg-center w-100 gap-2 gap-lg-4 fw-medium text-uppercase small text-nowrap py-3 py-lg-0">
                            <li class="nav-item"><a class="nav-link active text-success px-lg-0 py-lg-3"
                                    href="index.html">Home</a></li>
                            <li class="nav-item"><a class="nav-link px-lg-0 py-lg-3"
                                    href="fresh-veggies.html">Veggies</a></li>
                            <li class="nav-item"><a class="nav-link text-warning px-lg-0 py-lg-3"
                                    href="fresh-fruits.html">Fruits</a></li>
                            <li class="nav-item"><a class="nav-link text-pink px-lg-0 py-lg-3"
                                    href="ice-cream-parlour.html">Ice-Cream</a></li>
                            <li class="nav-item"><a class="nav-link px-lg-0 py-lg-3" href="about-us.html">About</a></li>
                            <li class="nav-item"><a class="nav-link px-lg-0 py-lg-3" href="contact.html">Contact</a>
                            </li>

                            <!-- Mobile Only extra links -->
                            <li class="nav-item d-lg-none border-top pt-3 mt-2"><a class="nav-link text-dark"
                                    href="orders.html"><i class="bi bi-box-seam me-2 text-success"></i>My Orders</a>
                            </li>
                            <li class="nav-item d-lg-none"><a class="nav-link text-dark" href="login.html"><i
                                        class="bi bi-person me-2 text-success"></i>Profile Login</a></li>
                            <li class="nav-item d-lg-none mt-4 mb-3 px-2">
                                <button onclick="window.installApp()" class="btn btn-success w-100 rounded-pill d-flex justify-content-center align-items-center gap-2 fw-bold shadow-sm p-2 border-0">
                                    <img src="app_logo.png" alt="App Logo" height="28" width="28" style="border-radius: 8px; object-fit: cover;" class="bg-white p-1 shadow-sm"> Download App
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <!-- Page Header -->
    <div class="page-header py-4 bg-white border-bottom border-secondary border-opacity-10 shadow-sm">
        <div
            class="container text-center text-md-start d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h2 class="fw-bold text-dark mb-0"><i class="bi bi-box-seam text-success me-2"></i> My <span
                    class="text-success">Orders</span></h2>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html" class="text-success text-decoration-none">Home</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page">Orders</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- Orders Content -->
    <div class="container py-5 min-vh-50">
        <div class="row justify-content-center">
            <div class="col-xl-9 col-lg-10" id="customerOrdersGrid">
                <!-- Orders injected by script.js -->
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Firebase Data SDKs (Compat Version for local file:// access) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="catalog.js"></script>
    <script src="script.js"></script>
    <!-- AOS Animation JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</body>

</html>
