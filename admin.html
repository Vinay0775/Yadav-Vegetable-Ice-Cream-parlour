<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Yadav Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-sidebar { background-color: var(--theme-dark-green); min-height: 100vh; }
        .admin-nav-link { color: rgba(255,255,255,0.7); display: block; padding: 12px 20px; text-decoration: none; border-radius: 8px; margin-bottom: 5px; }
        .admin-nav-link:hover, .admin-nav-link.active { background-color: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body class="bg-light">

    <div class="d-flex flex-column flex-md-row">
        <!-- Sidebar -->
        <div class="admin-sidebar p-3 text-white" style="width: 100%; max-width: 250px;">
            <a class="text-decoration-none fw-bold fs-4 text-white d-block mb-5 text-center" href="index.html">
                Yadav <span class="text-success">Admin</span>
            </a>
            
            <nav class="nav flex-column">
                <a href="#" class="admin-nav-link active"><i class="bi bi-grid-1x2-fill me-2"></i> Dashboard</a>
                <a href="#" class="admin-nav-link"><i class="bi bi-box-seam me-2"></i> Orders <span class="badge bg-warning text-dark ms-2 rounded-pill">New</span></a>
                <a href="#" class="admin-nav-link"><i class="bi bi-people-fill me-2"></i> Customers</a>
                <a href="#" class="admin-nav-link"><i class="bi bi-basket-fill me-2"></i> Products</a>
                <a href="#" class="admin-nav-link"><i class="bi bi-bar-chart-fill me-2"></i> Analytics</a>
                <a href="#" class="admin-nav-link mt-5 text-danger"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark mb-0">Overview</h3>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-muted"><i class="bi bi-calendar3 me-2"></i> Today</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=random" class="rounded-circle shadow-sm" style="width: 40px;">
                </div>
            </div>

            <!-- Stats -->
            <div class="row g-4 mb-5" id="adminOrdersGrid">
                <!-- Data fetched by script.js checking adminGrid presence -->
                <div class="col-sm-6 col-lg-4">
                    <div class="card border-0 shadow-sm rounded-4 h-100 bg-white p-4 d-flex flex-row align-items-center justify-content-between">
                        <div>
                            <p class="text-muted small mb-1">Total Revenue</p>
                            <h3 class="fw-bold text-success mb-0" id="totalSalesVal">₹0</h3>
                        </div>
                        <div class="bg-success bg-opacity-10 text-success rounded-circle p-3 fs-3"><i class="bi bi-currency-rupee"></i></div>
                    </div>
                </div>
                <div class="col-sm-6 col-lg-4">
                    <div class="card border-0 shadow-sm rounded-4 h-100 bg-white p-4 d-flex flex-row align-items-center justify-content-between">
                        <div>
                            <p class="text-muted small mb-1">Total Orders</p>
                            <h3 class="fw-bold text-primary mb-0" id="totalOrdersCount">0</h3>
                        </div>
                        <div class="bg-primary bg-opacity-10 text-primary rounded-circle p-3 fs-3"><i class="bi bi-bag-check-fill"></i></div>
                    </div>
                </div>
                <div class="col-sm-6 col-lg-4">
                    <div class="card border-0 shadow-sm rounded-4 h-100 bg-white p-4 d-flex flex-row align-items-center justify-content-between">
                        <div>
                            <p class="text-muted small mb-1">Active Users</p>
                            <h3 class="fw-bold text-warning mb-0" id="activeUsersCount">0</h3>
                        </div>
                        <div class="bg-warning bg-opacity-10 text-warning rounded-circle p-3 fs-3"><i class="bi bi-people-fill"></i></div>
                    </div>
                </div>
            </div>

            <!-- Recent Orders Table -->
            <div class="card border-0 shadow-sm rounded-4 bg-white">
                <div class="card-header bg-white border-bottom p-4">
                    <h5 class="fw-bold mb-0">Recent Orders</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-muted small">
                                <tr>
                                    <th class="py-3 px-4 fw-medium border-0">Tracking ID</th>
                                    <th class="py-3 fw-medium border-0">Date</th>
                                    <th class="py-3 fw-medium border-0">Customer</th>
                                    <th class="py-3 fw-medium border-0">Items</th>
                                    <th class="py-3 fw-medium border-0">Total</th>
                                    <th class="py-3 px-4 fw-medium border-0">Status</th>
                                </tr>
                            </thead>
                            <tbody id="adminTableBody">
                                <!-- injected via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Firebase Data SDKs (Compat Version for local file:// access) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="catalog.js"></script>
    <script src="script.js"></script>
</body>
</html>
