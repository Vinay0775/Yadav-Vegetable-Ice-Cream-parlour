<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login & Signup - Yadav Vegetable Ice-Cream Parlour</title>
    <link rel="icon" type="image/png" href="assets/fav-icon.png">
    <link rel="apple-touch-icon" href="assets/fav-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-bg {
            background-color: #f8f9fa;
        }

        .login-card {
            max-width: 480px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .social-btn {
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .social-btn i {
            font-size: 1.2rem;
        }

        .btn-google {
            background-color: #fff;
            color: #444;
            border: 1px solid #ddd;
        }

        .btn-google:hover {
            background-color: #f1f1f1;
        }

        .btn-facebook {
            background-color: #1877F2;
            color: #fff;
            border: 1px solid #1877F2;
        }

        .btn-facebook:hover {
            background-color: #166fe5;
            color: #fff;
        }

        .btn-twitter {
            background-color: #000;
            color: #fff;
            border: 1px solid #000;
        }

        .btn-twitter:hover {
            background-color: #333;
            color: #fff;
        }

        /* Toggle Styles */
        .auth-toggle {
            display: flex;
            background: #f1f1f1;
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 30px;
        }

        .auth-toggle-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
        }

        .auth-toggle-btn.active {
            background: #198754;
            color: #fff;
            box-shadow: 0 4px 10px rgba(25, 135, 84, 0.3);
        }

        .signup-fields {
            display: none;
        }

        .is-signup .signup-fields {
            display: block;
        }

        .is-signup .login-only {
            display: none;
        }
    </style>
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body class="login-bg d-flex align-items-center min-vh-100 py-5">

    <div class="container d-flex justify-content-center">
        <div class="card login-card border-0 bg-white mt-4">
            <div class="p-4 p-sm-5">
                <div class="text-center mb-4">
                    <a class="text-decoration-none fw-bold fs-3 logo-text d-inline-block" href="index.html">
                        Yadav <span class="text-success">Store</span> <span class="text-pink fs-5">& Ice-Cream</span>
                    </a>
                    <p class="text-muted mt-2" id="authSubtitle">Welcome back! Please login to your account.</p>
                </div>

                <div class="auth-toggle">
                    <div class="auth-toggle-btn active" id="toggleLogin" onclick="setAuthMode('login')">Login</div>
                    <div class="auth-toggle-btn" id="toggleSignup" onclick="setAuthMode('signup')">Sign Up</div>
                </div>

                <form id="authForm">
                    <div class="mb-3 signup-fields">
                        <label class="form-label text-muted small fw-medium">Full Name</label>
                        <input type="text" id="authName"
                            class="form-control form-control-lg bg-light border-0 shadow-none px-4 rounded-pill"
                            placeholder="Vinay Yadav">
                    </div>

                    <div class="mb-3 signup-fields mt-3" style="display:none;">
                        <label class="form-label text-muted small fw-medium">Mobile Number</label>
                        <input type="tel" id="authPhone"
                            class="form-control form-control-lg bg-light border-0 shadow-none px-4 rounded-pill"
                            placeholder="9876543210">
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-medium">Email address</label>
                        <input type="email" id="authEmail"
                            class="form-control form-control-lg bg-light border-0 shadow-none px-4 rounded-pill"
                            placeholder="name@example.com" required>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between login-only">
                            <label class="form-label text-muted small fw-medium">Password</label>
                            <a href="#" onclick="window.resetPassword(); return false;"
                                class="text-success text-decoration-none small fw-medium">Forgot Password?</a>
                        </div>
                        <label class="form-label text-muted small fw-medium signup-fields" style="display:none;">Create
                            Password</label>
                        <input type="password" id="authPassword"
                            class="form-control form-control-lg bg-light border-0 shadow-none px-4 rounded-pill"
                            placeholder="••••••••" required>
                    </div>

                    <div class="mb-4 mx-2 form-check login-only">
                        <input type="checkbox" class="form-check-input bg-success border-success shadow-none"
                            id="rememberMe" checked disabled>
                        <label class="form-check-label text-muted small" for="rememberMe">Stay logged in until you log out</label>
                    </div>

                    <div class="d-grid mb-4">
                        <button type="submit" id="authSubmitBtn"
                            class="btn btn-success btn-lg rounded-pill fw-bold shadow-sm hover-lift">Login to
                            Account</button>
                    </div>
                </form>

                <div class="d-flex align-items-center my-4">
                    <hr class="flex-grow-1 text-muted opacity-25">
                    <span class="px-3 text-muted small fw-medium" id="socialText">OR LOGIN WITH</span>
                    <hr class="flex-grow-1 text-muted opacity-25">
                </div>

                <div class="d-grid gap-3">
                    <button type="button"
                        class="btn social-btn btn-google d-flex align-items-center justify-content-center gap-2 hover-lift"
                        onclick="socialLogin('Google')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                            class="bi bi-google" viewBox="0 0 16 16">
                            <path
                                d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z" />
                        </svg>
                        Google
                    </button>
                    <div class="d-flex gap-3">
                        <button type="button"
                            class="btn social-btn w-50 btn-facebook d-flex align-items-center justify-content-center gap-2 hover-lift"
                            onclick="socialLogin('Facebook')">
                            <i class="bi bi-facebook"></i> Facebook
                        </button>
                        <button type="button"
                            class="btn social-btn w-50 btn-twitter d-flex align-items-center justify-content-center gap-2 hover-lift"
                            onclick="socialLogin('Twitter')">
                            <i class="bi bi-twitter-x"></i> Twitter
                        </button>
                    </div>
                </div>

                <div class="text-center mt-5 pt-3 border-top">
                    <a href="index.html" class="text-muted text-decoration-none small"><i
                            class="bi bi-arrow-left me-1"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Celebration Modal -->
    <div id="successOverlay"
        class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center"
        style="background: rgba(255, 255, 255, 0.95); z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; backdrop-filter: blur(5px);">
        <div class="text-center p-5 rounded-4 bg-white shadow-lg"
            style="transform: translateY(50px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-width: 400px; border: 1px solid #eee;">
            <div class="mb-3 text-success">
                <i class="bi bi-check-circle-fill" style="font-size: 5rem; animation: popIn 0.5s ease forwards;"></i>
            </div>
            <h3 class="fw-bold mb-2 text-dark" id="successTitle">Welcome!</h3>
            <p class="text-muted mb-0 fs-5" id="successMessage">Successfully logged in.</p>
        </div>
    </div>
    <style>
        @keyframes popIn {
            0% {
                transform: scale(0);
            }

            80% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
    <script>

        function showSuccessCelebration(title, message, redirectUrl) {
            const overlay = document.getElementById('successOverlay');
            document.getElementById('successTitle').innerText = title;
            document.getElementById('successMessage').innerText = message;

            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'auto';
            overlay.querySelector('div').style.transform = 'translateY(0)';

            // Trigger Confetti
            var duration = 2500;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#198754', '#ffc107', '#fd7e14', '#0dcaf0', '#d63384'],
                    zIndex: 10000
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#198754', '#ffc107', '#fd7e14', '#0dcaf0', '#d63384'],
                    zIndex: 10000
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 2500); // Redirect after 2.5 seconds
        }

        let isSignup = false;

        async function applySelectedPersistence() {
            await window.auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        }

        async function getRedirectForUser(user) {
            if (typeof window.getPostLoginRedirect === 'function') {
                return window.getPostLoginRedirect(user);
            }
            return 'profile.html';
        }

        window.setAuthMode = function (mode) {
            const submitBtn = document.getElementById('authSubmitBtn');
            const subtitle = document.getElementById('authSubtitle');
            const socialText = document.getElementById('socialText');

            if (mode === 'signup') {
                isSignup = true;
                document.getElementById('toggleSignup').classList.add('active');
                document.getElementById('toggleLogin').classList.remove('active');
                document.body.classList.add('is-signup');

                document.getElementById('authName').setAttribute('required', 'true');
                document.getElementById('authPhone').setAttribute('required', 'true');

                submitBtn.innerText = 'Create Account';
                subtitle.innerText = 'Join Yadav Store & Ice-Cream today!';
                socialText.innerText = 'OR SIGN UP WITH';

                document.querySelectorAll('.signup-fields').forEach(el => el.style.display = 'block');
                document.querySelectorAll('.login-only').forEach(el => el.style.display = 'none');
            } else {
                isSignup = false;
                document.getElementById('toggleLogin').classList.add('active');
                document.getElementById('toggleSignup').classList.remove('active');
                document.body.classList.remove('is-signup');

                document.getElementById('authName').removeAttribute('required');
                document.getElementById('authPhone').removeAttribute('required');

                submitBtn.innerText = 'Login to Account';
                subtitle.innerText = 'Welcome back! Please login to your account.';
                socialText.innerText = 'OR LOGIN WITH';

                document.querySelectorAll('.signup-fields').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.login-only').forEach(el => el.style.display = 'block'); // reset forgotten password etc.
                document.querySelector('.d-flex.justify-content-between.login-only').style.display = 'flex'; // special flex rule
            }
        }

        window.setAuthMode('login'); // default

        // Handle the main form submission for both generic Login and Sign Up
        document.getElementById('authForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = (window.normalizeEmail ? window.normalizeEmail(document.getElementById('authEmail').value) : document.getElementById('authEmail').value.trim().toLowerCase());
            const password = document.getElementById('authPassword').value;
            const submitBtn = document.getElementById('authSubmitBtn');

            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            try {
                if (isSignup) {
                    // Create User in Firebase Authentication
                    const name = document.getElementById('authName').value.trim();
                    const phone = document.getElementById('authPhone').value.trim();
                    await window.auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

                    const userCredential = await window.auth.createUserWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    // Update display name natively in Firebase
                    await user.updateProfile({ displayName: name });

                    await window.db.collection("users").doc(user.uid).set({
                        uid: user.uid,
                        name: name,
                        email: email,
                        phone: phone,
                        joinedAt: new Date().toISOString(),
                        lastLoginAt: new Date().toISOString()
                    }, { merge: true });

                    const redirectUrl = await getRedirectForUser(user);
                    showSuccessCelebration("Account Created!", `Welcome ${name || 'User'}, your account is ready.`, redirectUrl);

                } else {
                    // Standard Login Validation
                    await applySelectedPersistence();
                    const userCredential = await window.auth.signInWithEmailAndPassword(email, password);
                    const user = userCredential.user;
                    const redirectUrl = await getRedirectForUser(user);

                    showSuccessCelebration("Login Successful!", `Welcome back, ${user.displayName || 'User'}.`, redirectUrl);
                }
            } catch (error) {
                console.error("Auth Error", error);

                // Detailed, user friendly error mapping
                if (error.code === 'auth/email-already-in-use') window.showToast("Error", "This email is already registered. Please Login instead.", true);
                else if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') window.showToast("Error", "Incorrect email or password. Try exactly again.", true);
                else if (error.code === 'auth/weak-password') window.showToast("Warning", "Password should be at least 6 characters.", true);
                else if (error.code === 'auth/operation-not-allowed') window.showToast("Error", "🚨 ERROR: Email/Password Auth is disabled in Firebase Console.", true);
                else window.showToast("Error", error.message, true);

                submitBtn.disabled = false;
                submitBtn.innerText = isSignup ? 'Create Account' : 'Login to Account';
            }
        });

        // Authentic Social Login Logic
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        const facebookProvider = new firebase.auth.FacebookAuthProvider();

        window.socialLoginLegacy = async function (providerName) {
            try {
                let provider = null;

                if (providerName === 'Google') provider = googleProvider;
                else if (providerName === 'Facebook') provider = facebookProvider;
                else {
                    window.showToast("Unsupported", `${providerName} login is not fully supported yet.`, true);
                    return;
                }

                // Warn user if trying to run OAuth on a local file path
                if (window.location.protocol === 'file:') {
                    window.showToast("Local URL Error", `🚨 ERROR: Social Login (${providerName}) DOES NOT WORK with 'file://' URLs. Open via live server or deployed site.`, true);
                    return;
                }

                const result = await window.auth.signInWithPopup(provider);
                const user = result.user;

                // Verify if they exist in firestore collection to avoid overwriting their joining date
                const userDocSnap = await window.db.collection("users").doc(user.uid).get();
                if (!userDocSnap.exists) {
                    await window.db.collection("users").doc(user.uid).set({
                        uid: user.uid,
                        name: user.displayName || 'User',
                        email: user.email || '',
                        phone: user.phoneNumber || 'Not provided',
                        joinedAt: new Date().toISOString()
                    });
                }

                showSuccessCelebration("Awesome!", `Welcome ${user.displayName || 'back'}! Successfully authenticated with ${providerName}.`, 'profile.html');
            } catch (error) {
                console.error("Popup Error:", error);
                if (error.code === 'auth/account-exists-with-different-credential') {
                    window.showToast("Auth Error", "⚠️ You already have an account with the same email using a different provider.", true);
                } else if (error.code === 'auth/unauthorized-domain') {
                    window.showToast("Domain Error", `⚠️ Domain not authorized! Add '${window.location.hostname}' to Authorized Domains.`, true);
                } else {
                    window.showToast("Login Failed", `❌ ${providerName} Login failed: ` + error.message, true);
                }
            }
        }

        window.socialLogin = async function (providerName) {
            try {
                let provider = null;

                if (providerName === 'Google') provider = googleProvider;
                else if (providerName === 'Facebook') provider = facebookProvider;
                else {
                    window.showToast("Unsupported", `${providerName} login is not fully supported yet.`, true);
                    return;
                }

                if (window.location.protocol === 'file:') {
                    window.showToast("Local URL Error", `Social Login (${providerName}) does not work with 'file://' URLs. Open via live server or deployed site.`, true);
                    return;
                }

                await applySelectedPersistence();
                const result = await window.auth.signInWithPopup(provider);
                const user = result.user;
                const normalizedEmail = window.normalizeEmail ? window.normalizeEmail(user.email || '') : (user.email || '').trim().toLowerCase();

                const userDocRef = window.db.collection("users").doc(user.uid);
                const userDocSnap = await userDocRef.get();
                if (!userDocSnap.exists) {
                    await userDocRef.set({
                        uid: user.uid,
                        name: user.displayName || 'User',
                        email: normalizedEmail,
                        phone: user.phoneNumber || 'Not provided',
                        joinedAt: new Date().toISOString()
                    }, { merge: true });
                }

                await userDocRef.set({
                    email: normalizedEmail,
                    name: user.displayName || 'User',
                    phone: user.phoneNumber || 'Not provided',
                    lastLoginAt: new Date().toISOString()
                }, { merge: true });

                const redirectUrl = await getRedirectForUser(user);
                showSuccessCelebration("Awesome!", `Welcome ${user.displayName || 'back'}! Successfully authenticated with ${providerName}.`, redirectUrl);
            } catch (error) {
                console.error("Popup Error:", error);
                if (error.code === 'auth/account-exists-with-different-credential') {
                    window.showToast("Auth Error", "You already have an account with the same email using a different provider.", true);
                } else if (error.code === 'auth/unauthorized-domain') {
                    window.showToast("Domain Error", `Domain not authorized. Add '${window.location.hostname}' to Authorized Domains.`, true);
                } else {
                    window.showToast("Login Failed", `${providerName} login failed: ` + error.message, true);
                }
            }
        };

        // Active Forgot Password Reset Logic
        window.resetPassword = function () {
            const existingModal = document.getElementById('resetPasswordModal');
            if (existingModal) existingModal.remove();

            const currentEmail = document.getElementById('authEmail');
            const prefilledEmail = currentEmail ? currentEmail.value.trim() : '';

            const modalHtml = `
            <div id="resetPasswordModal" class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center" style="background: rgba(0,0,0,0.5); z-index: 9999; backdrop-filter: blur(5px);" onclick="if(event.target === this){ window.closeResetPasswordModal(); }">
                <div class="bg-white p-4 rounded-4 shadow-lg text-center" style="max-width: 400px; width: 90%; animation: popIn 0.3s ease;">
                    <i class="bi bi-envelope-check-fill text-success mb-3" style="font-size: 3rem;"></i>
                    <h4 class="fw-bold text-dark">Reset Password</h4>
                    <p class="text-muted small">Enter your registered email address to receive a secure password reset link.</p>
                    <input type="email" id="resetEmailField" class="form-control mb-3 rounded-pill text-center shadow-none" placeholder="name@example.com" value="${prefilledEmail}">
                    <div class="d-flex gap-2 justify-content-center">
                        <button class="btn btn-light rounded-pill px-4 hover-lift" onclick="window.closeResetPasswordModal()">Cancel</button>
                        <button class="btn btn-success rounded-pill px-4 hover-lift fw-medium" id="resetSendBtn" onclick="processPasswordReset()">Send Link</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const resetField = document.getElementById('resetEmailField');
            resetField.focus();
            resetField.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    window.processPasswordReset();
                }
            });
        };

        window.closeResetPasswordModal = function () {
            const modal = document.getElementById('resetPasswordModal');
            if (modal) modal.remove();
        };

        window.processPasswordReset = async function () {
            const rawEmail = document.getElementById('resetEmailField').value;
            const email = window.normalizeEmail ? window.normalizeEmail(rawEmail) : rawEmail.trim().toLowerCase();
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                window.showToast("Required", "Please enter a valid email address.", true);
                return;
            }

            const btn = document.getElementById('resetSendBtn');
            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                const signInMethods = await window.auth.fetchSignInMethodsForEmail(email);
                if (!signInMethods.length) {
                    btn.disabled = false;
                    btn.innerText = "Send Link";
                    window.showToast("Not Found", "No account found matching this email.", true);
                    return;
                }

                if (!signInMethods.includes('password')) {
                    btn.disabled = false;
                    btn.innerText = "Send Link";
                    window.showToast("Use Social Login", "This account was created with a social provider. Please login with Google or Facebook.", true);
                    return;
                }

                if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                    await window.auth.sendPasswordResetEmail(email, {
                        url: new URL('login.html', window.location.href).href,
                        handleCodeInApp: false
                    });
                } else {
                    await window.auth.sendPasswordResetEmail(email);
                }

                window.closeResetPasswordModal();
                window.showToast("Sent Successfully!", "A password reset link has been dispatched to your email.");
            } catch (error) {
                console.error("Reset Error", error);
                btn.disabled = false;
                btn.innerText = "Send Link";
                if (error.code === 'auth/user-not-found') window.showToast("Not Found", "No account found matching this email.", true);
                else if (error.code === 'auth/invalid-email') window.showToast("Invalid Email", "Please enter a valid registered email address.", true);
                else if (error.code === 'auth/too-many-requests') window.showToast("Try Later", "Too many reset attempts. Please wait a little and try again.", true);
                else window.showToast("Error", "Failed to send: " + error.message, true);
            }
        };

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                window.closeResetPasswordModal();
            }
        });
    </script>
    <!-- AOS Animation JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</body>

</html>
