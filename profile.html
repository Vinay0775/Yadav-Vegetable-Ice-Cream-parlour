<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Profile - Yadav Vegetable Ice-Cream Parlour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-img-container {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--theme-green);
            position: relative;
            overflow: hidden;
            background: #eee;
            margin: 0 auto;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 0;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            transform: translateY(100%);
        }

        .profile-img-container:hover .upload-overlay {
            transform: translateY(0);
        }

        .hidden-upload {
            display: none;
        }
    </style>
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Header (Simple) -->
    <header class="main-header py-3 bg-white border-bottom align-items-center shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="text-decoration-none fw-bold fs-3 logo-text" href="index.html">
                Yadav <span class="text-success">vegetable & ice-cream parlour</span>
            </a>
            <div class="header-icons d-flex align-items-center gap-3">
                <a href="#" class="text-dark text-decoration-none fs-5 icon-link theme-toggle-btn me-2" title="Toggle Dark/Light Mode"><i class="bi bi-moon"></i></a>
                <a href="orders.html" class="text-dark text-decoration-none small fw-medium me-3"><i
                        class="bi bi-box-seam me-1"></i> My Orders</a>
                <a href="cart.html" class="text-dark text-decoration-none small fw-medium"><i
                        class="bi bi-cart3 me-1"></i> Cart</a>
            </div>
        </div>
    </header>

    <!-- Profile Interface -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-4">
                    <div class="bg-success pt-5 pb-3 px-4 position-relative text-center text-white"
                        style="height: 120px;"></div>

                    <div class="card-body px-4 pb-5 pt-0 text-center position-relative" style="margin-top: -75px;">

                        <!-- Image Upload Container -->
                        <div class="profile-img-container shadow-sm mb-3">
                            <img src="https://ui-avatars.com/api/?name=User&size=200&background=e9ecef"
                                id="profileImage" class="profile-img" alt="Profile Picture">
                            <label for="imageUpload" class="upload-overlay text-center mb-0 w-100">
                                <i class="bi bi-camera me-1"></i> Upload
                            </label>
                            <input type="file" id="imageUpload" class="hidden-upload" accept="image/*">
                        </div>

                        <h3 class="fw-bold mb-1" id="profileName">Loading...</h3>
                        <p class="text-muted mb-4" id="profileEmail">Loading...</p>

                        <div class="d-flex justify-content-center gap-2 mb-4">
                            <span
                                class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill border border-success border-opacity-25"
                                id="memberBadge">
                                <i class="bi bi-star-fill me-1 text-warning"></i> Store Member
                            </span>
                        </div>

                        <div class="row text-center mt-4 border-top pt-4">
                            <div class="col-6 border-end">
                                <h4 class="fw-bold text-dark mb-0" id="ordersCount">0</h4>
                                <span class="text-muted small">Total Orders</span>
                            </div>
                            <div class="col-6">
                                <h4 class="fw-bold text-dark mb-0">Active</h4>
                                <span class="text-muted small">Status</span>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="text-center mt-4">
                    <button class="btn btn-outline-danger px-4 rounded-pill fw-medium" id="logoutBtn"><i
                            class="bi bi-box-arrow-right me-2"></i> Log Out</button>
                    <a href="index.html" class="btn btn-light px-4 rounded-pill fw-medium ms-2 border"><i
                            class="bi bi-shop me-2"></i> Return to Shop</a>
                    <a href="#" class="btn btn-dark px-4 rounded-pill fw-medium ms-2 mt-2 mt-md-0 shadow-sm">
                        <i class="bi bi-google-play text-success me-2"></i> Download App
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="script.js?v=2"></script>
    <script>

        document.addEventListener('DOMContentLoaded', () => {

            const profileName = document.getElementById('profileName');
            const profileEmail = document.getElementById('profileEmail');
            const profileImage = document.getElementById('profileImage');

            let currentUserData = null; // Store current user for upload access

            // Listen to real Firebase Auth State
            window.auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUserData = user;
                    profileName.innerText = user.displayName || 'Store Customer';
                    profileEmail.innerText = user.email || 'customer@example.com';

                    // Display Google DP if available, otherwise check LocalStorage custom image
                    const savedImage = localStorage.getItem(`yadavProfilePic_${user.uid}`);
                    if (savedImage) {
                        profileImage.src = savedImage;
                    } else if (user.photoURL) {
                        profileImage.src = user.photoURL;
                    } else {
                        profileImage.src = `https://ui-avatars.com/api/?name=${user.displayName || 'User'}&size=200&background=random&color=fff`;
                    }

                    // Fetch actual total orders from Firestore user doc metadata or orders query
                    try {
                        const userDoc = await window.db.collection("users").doc(user.uid).get();
                        if (userDoc.exists) {
                            // If we save order count in user doc, we can display it. 
                            // Otherwise, fallback to local storage length for instant UI
                            const localOrders = JSON.parse(localStorage.getItem('yadavOrders')) || [];
                            document.getElementById('ordersCount').innerText = localOrders.length > 0 ? localOrders.length : 0;
                            // Update this to real firestore count later if needed.
                        }
                    } catch (e) { }

                } else {
                    // Force redirect if not authenticated
                    window.location.href = 'login.html';
                }
            });

            // Image Upload Handler (Base64 conversion)
            const imageUpload = document.getElementById('imageUpload');

            imageUpload.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 2 * 1024 * 1024) {
                        window.showToast("Error", "File too big! Please select an image under 2MB.", true);
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = function (event) {
                        const base64String = event.target.result;
                        profileImage.src = base64String;
                        if (currentUserData) {
                            localStorage.setItem(`yadavProfilePic_${currentUserData.uid}`, base64String);
                        }
                        window.showToast("Success!", "Profile picture updated successfully!");
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Logout Handler
            document.getElementById('logoutBtn').addEventListener('click', () => {
                window.showToast('Logging Out...', 'See you soon!');
                setTimeout(() => {
                    window.auth.signOut().then(() => {
                        localStorage.removeItem('yadavSession');
                        window.location.href = 'login.html';
                    });
                }, 1000);
            });
        });
    </script>
    <!-- AOS Animation JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
</body>

</html>
