<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secure Checkout - Yadav Store</title>
    <link rel="icon" type="image/png" href="assets/fav-icon.png">
    <link rel="apple-touch-icon" href="assets/fav-icon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Premium Checkout Styles -->
    <style>
        .checkout-page {
            --chk-primary: #198754;
            --chk-bg: #f5f8f6;
            --chk-card-bg: #ffffff;
            --chk-border: #e8f5e9;
            --chk-text: #2c3e50;
            --chk-shadow: 0 4px 20px rgba(0,0,0,0.06);
            --chk-radius: 16px;
            
            background: var(--chk-bg);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        .checkout-header {
            background: linear-gradient(135deg, var(--chk-primary) 0%, #157347 100%);
            color: white;
            padding: 1.5rem 1rem;
            text-align: center;
        }

        .checkout-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
        .checkout-header p { font-size: 0.875rem; opacity: 0.9; margin: 0; }

        .checkout-card {
            background: var(--chk-card-bg);
            border-radius: var(--chk-radius);
            box-shadow: var(--chk-shadow);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #f0f0f0;
        }

        .checkout-card-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--chk-text);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .checkout-card-title i {
            color: var(--chk-primary);
            font-size: 1.25rem;
            background: #e8f5e9;
            padding: 8px;
            border-radius: 10px;
        }

        .chk-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Jost', sans-serif;
            background: #fdfdfd;
            transition: all 0.3s ease;
        }

        .chk-input:focus {
            outline: none;
            border-color: var(--chk-primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(25, 135, 84, 0.1);
        }

        .chk-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 576px) {
            .chk-row { grid-template-columns: 1fr; }
        }

        .summary-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 0;
            border-bottom: 1px dashed #e9ecef;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-img {
            width: 60px; height: 60px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .summary-details { flex-grow: 1; }
        .summary-title { font-weight: 600; font-size: 0.95rem; margin: 0; color: #343a40; }
        .summary-price { font-weight: 700; color: #212529; }
        .summary-qty { font-size: 0.8rem; color: #6c757d; }

        .continue-btn {
            background: linear-gradient(135deg, var(--chk-primary) 0%, #146c43 100%);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 8px 20px rgba(25, 135, 84, 0.25);
            transition: all 0.3s ease;
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(25, 135, 84, 0.35);
        }
        
        .totals-box {
            background: #f8f9fa;
            padding: 1.25rem;
            border-radius: 12px;
            margin-top: 1rem;
        }
        
        .totals-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: #6c757d;
        }
        
        .totals-row.grand-total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--chk-primary);
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 2px dashed #dee2e6;
        }
    </style>
</head>

<body>

    <div class="checkout-page">
        <!-- Header -->
        <div class="checkout-header position-relative">
            <div class="d-flex align-items-center justify-content-between mb-2">
                <a href="cart.html" class="btn btn-link text-white text-decoration-none">
                    <i class="bi bi-arrow-left fs-4"></i>
                </a>
                <a class="text-decoration-none fw-bold fs-4 text-white text-center flex-grow-1" href="index.html">
                    Yadav <span class="text-warning">Veggies</span>
                </a>
                <div style="width: 40px;"></div>
            </div>
            <h2>Checkout Details</h2>
            <p>Tell us where to deliver your fresh items</p>
        </div>

        <div class="container mt-4" style="max-width: 1000px;">
            <div class="row g-4">
                
                <!-- Form Column -->
                <div class="col-lg-7" id="checkoutFormColumn" data-aos="fade-up">
                    <form id="checkoutForm">
                        <div class="checkout-card">
                            <div class="checkout-card-title">
                                <i class="bi bi-person-circle"></i> Contact Information
                            </div>
                            <div class="mb-3">
                                <input type="email" id="chkEmail" class="chk-input" placeholder="Email Address or Phone Number" required>
                            </div>
                        </div>

                        <div class="checkout-card">
                            <div class="checkout-card-title">
                                <i class="bi bi-house-door-fill"></i> Delivery Address
                            </div>
                            <div class="chk-row mb-3">
                                <input type="text" id="chkFirstName" class="chk-input" placeholder="First Name" required>
                                <input type="text" id="chkLastName" class="chk-input" placeholder="Last Name" required>
                            </div>
                            <div class="mb-3">
                                <input type="text" id="chkAddress" class="chk-input" placeholder="Complete Address (Flat, House no., Area)" required>
                            </div>
                            <div class="chk-row">
                                <input type="text" id="chkCity" class="chk-input" placeholder="City" required>
                                <input type="tel" id="chkin" class="chk-input" placeholder="PIN Code" required pattern="[0-9]{6}">
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Order Summary Column -->
                <div class="col-lg-5" data-aos="fade-up" data-aos-delay="100">
                    <div class="checkout-card sticky-top" style="top: 20px;">
                        <div class="checkout-card-title border-bottom pb-3 mb-3">
                            <i class="bi bi-bag-check-fill"></i> Order Summary
                        </div>
                        
                        <div id="checkoutCartItems" style="max-height: 250px; overflow-y: auto; padding-right: 5px;">
                            <!-- Items injected dynamically -->
                        </div>
                        
                        <div class="totals-box">
                            <div class="totals-row">
                                <span>Subtotal</span>
                                <span id="checkoutSubtotal">₹0</span>
                            </div>
                            <div class="totals-row">
                                <span>Shipping Fees</span>
                                <span class="text-success">Free Delivery</span>
                            </div>
                            <div class="totals-row">
                                <span>Estimated Tax (5%)</span>
                                <span id="checkoutTax">₹0</span>
                            </div>
                            <div class="totals-row grand-total">
                                <span>Total Amount</span>
                                <span id="checkoutTotal">₹0</span>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="button" class="continue-btn" onclick="saveCheckoutDetailsAndProceed()">
                                Proceed to Payment <i class="bi bi-shield-lock-fill shadow-sm"></i>
                            </button>
                            <p class="text-center text-muted small mt-3 mb-0">
                                <i class="bi bi-shield-check text-success"></i> Your data is perfectly secure
                            </p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Firebase Data SDKs (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="catalog.js"></script>
    <script src="script.js?v=9"></script>
    <!-- AOS Animation -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
        
        // Checkout Validation & Navigation Flow
        function saveCheckoutDetailsAndProceed() {
            const form = document.getElementById('checkoutForm');
            if(!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            // Save info directly to localStorage to retrieve it on Payment page or final order submission
            const checkoutData = {
                email: document.getElementById('chkEmail').value,
                firstName: document.getElementById('chkFirstName').value,
                lastName: document.getElementById('chkLastName').value,
                address: document.getElementById('chkAddress').value,
                city: document.getElementById('chkCity').value,
                pin: document.getElementById('chkin').value,
            };
            
            localStorage.setItem('yadavCheckoutDetails', JSON.stringify(checkoutData));
            
            // Navigate to payment page
            window.location.href = 'payment.html';
        }
        
        // Render Checkout Page Initializer (logic inside script.js)
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.renderCheckoutPage === 'function') {
                window.renderCheckoutPage();
            }
        });
    </script>
</body>
</html>
